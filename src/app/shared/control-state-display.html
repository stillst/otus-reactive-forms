  <mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ label() }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table>
      <tr>
        <td>value</td>
        <td>{{ control().value | json }}</td>
      </tr>
      <tr>
        <td>status</td>
        <td [class]="'status-' + control().status.toLowerCase()">
          {{ control().status }}
        </td>
      </tr>
      <tr>
        <td>valid</td>
        <td>{{ control().valid }}</td>
      </tr>
      <tr>
        <td>dirty</td>
        <td>{{ control().dirty }}</td>
      </tr>
      <tr>
        <td>touched</td>
        <td>{{ control().touched }}</td>
      </tr>
      <tr>
        <td>errors</td>
        <td>{{ control().errors | json }}</td>
      </tr>
    </table>
  </mat-card-content>
</mat-card>
